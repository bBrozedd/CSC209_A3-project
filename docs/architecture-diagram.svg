<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="920" viewBox="0 0 1400 920">
  <defs>
    <style>
      .title { font: 700 34px 'DejaVu Sans', Arial, sans-serif; fill: #1b1f24; }
      .subtitle { font: 500 17px 'DejaVu Sans', Arial, sans-serif; fill: #4b5563; }
      .section { font: 700 22px 'DejaVu Sans', Arial, sans-serif; fill: #111827; }
      .label { font: 600 18px 'DejaVu Sans', Arial, sans-serif; fill: #111827; }
      .text { font: 16px 'DejaVu Sans', Arial, sans-serif; fill: #374151; }
      .small { font: 14px 'DejaVu Sans', Arial, sans-serif; fill: #4b5563; }
      .mono { font: 14px 'DejaVu Sans Mono', monospace; fill: #1f2937; }
      .box { stroke: #1f2937; stroke-width: 2.5; rx: 18; ry: 18; }
      .data { stroke: #6b7280; stroke-width: 2; stroke-dasharray: 7 5; rx: 14; ry: 14; }
      .line { stroke: #1f2937; stroke-width: 3; fill: none; }
      .thin { stroke: #6b7280; stroke-width: 2.5; fill: none; }
      .hint { fill: #eef6ff; stroke: #93c5fd; stroke-width: 2; rx: 14; ry: 14; }
    </style>
    <marker id="arrow-dark" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#1f2937" />
    </marker>
    <marker id="arrow-gray" markerWidth="9" markerHeight="9" refX="7.5" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#6b7280" />
    </marker>
  </defs>

  <rect width="1400" height="920" fill="#f8fafc" />
  <rect x="28" y="28" width="1344" height="864" fill="#ffffff" stroke="#d1d5db" stroke-width="2" rx="24" ry="24" />

  <text x="700" y="76" text-anchor="middle" class="title">Distributed Logistic Regression Architecture</text>
  <text x="700" y="108" text-anchor="middle" class="subtitle">Parameter-server design implemented with TCP sockets and synchronous worker updates</text>

  <rect x="450" y="150" width="500" height="170" fill="#dbeafe" class="box" />
  <text x="700" y="188" text-anchor="middle" class="section">Server Process</text>
  <text x="700" y="216" text-anchor="middle" class="label">Parameter Server</text>
  <text x="700" y="244" text-anchor="middle" class="mono">./server [num_workers]</text>
  <text x="700" y="274" text-anchor="middle" class="text">Creates one listening socket on PORT, accepts N worker connections,</text>
  <text x="700" y="298" text-anchor="middle" class="text">then runs a single-threaded select()-based training loop.</text>

  <rect x="560" y="336" width="280" height="58" fill="#eef2ff" class="box" />
  <text x="700" y="370" text-anchor="middle" class="label">Listening socket</text>
  <text x="700" y="390" text-anchor="middle" class="mono">bind/listen on INADDR_ANY:PORT</text>

  <rect x="86" y="470" width="340" height="170" fill="#ecfdf5" class="box" />
  <text x="256" y="508" text-anchor="middle" class="section">Worker Client 1</text>
  <text x="256" y="536" text-anchor="middle" class="mono">./worker server_ip data_1.csv</text>
  <text x="256" y="564" text-anchor="middle" class="text">Connects to the server, loads one CSV partition,</text>
  <text x="256" y="588" text-anchor="middle" class="text">computes local gradient and local loss.</text>

  <rect x="530" y="470" width="340" height="170" fill="#ecfdf5" class="box" />
  <text x="700" y="508" text-anchor="middle" class="section">Worker Client 2</text>
  <text x="700" y="536" text-anchor="middle" class="mono">./worker server_ip data_2.csv</text>
  <text x="700" y="564" text-anchor="middle" class="text">Same worker binary, different TCP connection</text>
  <text x="700" y="588" text-anchor="middle" class="text">and a different local training-data partition.</text>

  <rect x="974" y="470" width="340" height="170" fill="#ecfdf5" class="box" />
  <text x="1144" y="508" text-anchor="middle" class="section">Worker Client N</text>
  <text x="1144" y="536" text-anchor="middle" class="mono">./worker server_ip data_N.csv</text>
  <text x="1144" y="564" text-anchor="middle" class="text">Same role for every additional worker</text>
  <text x="1144" y="588" text-anchor="middle" class="text">requested at server startup.</text>

  <rect x="112" y="694" width="288" height="92" fill="#fff7ed" class="data" />
  <text x="256" y="730" text-anchor="middle" class="label">Local dataset partition</text>
  <text x="256" y="756" text-anchor="middle" class="mono">data_1.csv</text>
  <text x="256" y="778" text-anchor="middle" class="small">rows: bias, x1, x2, label</text>

  <rect x="556" y="694" width="288" height="92" fill="#fff7ed" class="data" />
  <text x="700" y="730" text-anchor="middle" class="label">Local dataset partition</text>
  <text x="700" y="756" text-anchor="middle" class="mono">data_2.csv</text>
  <text x="700" y="778" text-anchor="middle" class="small">loaded only by Worker 2</text>

  <rect x="1000" y="694" width="288" height="92" fill="#fff7ed" class="data" />
  <text x="1144" y="730" text-anchor="middle" class="label">Local dataset partition</text>
  <text x="1144" y="756" text-anchor="middle" class="mono">data_N.csv</text>
  <text x="1144" y="778" text-anchor="middle" class="small">one partition per worker</text>

  <line x1="256" y1="640" x2="256" y2="694" class="thin" marker-end="url(#arrow-gray)" />
  <line x1="700" y1="640" x2="700" y2="694" class="thin" marker-end="url(#arrow-gray)" />
  <line x1="1144" y1="640" x2="1144" y2="694" class="thin" marker-end="url(#arrow-gray)" />

  <line x1="610" y1="394" x2="300" y2="470" class="line" marker-end="url(#arrow-dark)" />
  <line x1="664" y1="394" x2="700" y2="470" class="line" marker-end="url(#arrow-dark)" />
  <line x1="790" y1="394" x2="1100" y2="470" class="line" marker-end="url(#arrow-dark)" />

  <line x1="330" y1="470" x2="642" y2="394" class="thin" marker-end="url(#arrow-gray)" />
  <line x1="700" y1="470" x2="736" y2="394" class="thin" marker-end="url(#arrow-gray)" />
  <line x1="1070" y1="470" x2="758" y2="394" class="thin" marker-end="url(#arrow-gray)" />

  <text x="300" y="404" text-anchor="middle" class="label">TCP socket S1</text>
  <text x="300" y="425" text-anchor="middle" class="small">server -&gt; worker: PARAM, TRAIN_DONE</text>
  <text x="300" y="445" text-anchor="middle" class="small">worker -&gt; server: SEND_GRAD</text>

  <text x="600" y="432" text-anchor="middle" class="label">TCP socket S2</text>
  <text x="580" y="447" text-anchor="middle" class="small">same message flow on a</text>
  <text x="580" y="467" text-anchor="middle" class="small">separate accepted connection</text>

  <text x="1150" y="404" text-anchor="middle" class="label">TCP socket SN</text>
  <text x="1150" y="425" text-anchor="middle" class="small">one dedicated socket per worker client</text>
  <text x="1150" y="445" text-anchor="middle" class="small">all watched by select() on the server</text>

  <rect x="110" y="818" width="1180" height="50" class="hint" />
  <text x="700" y="849" text-anchor="middle" class="text">Message payloads: PARAM carries weight[3]; SEND_GRAD carries gradient[3], loss, n_samples; TRAIN_DONE carries final weight[3] and final loss.</text>
</svg>
